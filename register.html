<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <h2>Register</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Email address">
        <input type="password" id="password" placeholder="Password" onkeyup="checkStrength(); checkMatch();">
        <div id="strength"></div>
        <input type="password" id="confirmPassword" placeholder="Enter password again" onkeyup="checkMatch();">
        <button onclick="register()">Register</button>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
</div>

<script>
function checkStrength() {
    let pass = document.getElementById("password").value;
    let strengthText = document.getElementById("strength");

    if (pass.length < 6) {
        strengthText.textContent = "Weak password";
        strengthText.className = "weak";
    } else if (pass.match(/[0-9]/) && pass.match(/[A-Za-z]/)) {
        strengthText.textContent = "Strong password";
        strengthText.className = "strong";
    } else {
        strengthText.textContent = "Medium password";
        strengthText.className = "medium";
    }
}

function checkMatch() {
    let pass = document.getElementById("password");
    let confirm = document.getElementById("confirmPassword");

    if (confirm.value === "") {
        confirm.className = "";
        return;
    }

    if (pass.value === confirm.value) {
        confirm.className = "match";
    } else {
        // Fix: Changed from 'nomatch' to 'no-match' to match style.css
        confirm.className = "no-match"; 
    }
}
async function register() {
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;

    if (!username || !email || !password || !confirm) {
        alert("All fields are required");
        return;
    }

    if (password !== confirm) {
        alert("Passwords do not match");
        return;
    }

    const res = await fetch("http://localhost:5000/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password })
    });

    if (res.ok) {
        alert("Registered successfully!");
        window.location.href = "login.html";
    } else {
        alert("Registration failed");
    }
}
</script>

</body>
</html>
